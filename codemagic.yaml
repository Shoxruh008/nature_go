workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: stable

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Pod install
        script: |
          cd ios && pod install

      - name: Build IPA (no codesign)
        script: |
          flutter build ipa --release --no-codesign

    artifacts:
      - build/ios/iphoneos/*.app
      - build/ios/archive/*.xcarchive
      - "**/*.ipa"